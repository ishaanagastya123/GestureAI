<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura | AI Spotify Clone</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #00ffa3;
            --bg: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg); color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden; min-height: 100vh;
        }

        /* 3D Canvas Background */
        #canvas-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none; opacity: 0.6;
        }

        /* Top Search Navigation */
        .top-nav {
            position: fixed; top: 0; left: 0; width: 100%; height: 80px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            z-index: 100; display: flex; align-items: center; justify-content: center;
        }

        .search-container {
            width: 90%; max-width: 500px; background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px); border: 1px solid var(--border);
            border-radius: 100px; display: flex; align-items: center;
            padding: 10px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.3s;
        }
        .search-container:focus-within { border-color: var(--accent); background: rgba(255, 255, 255, 0.15); }

        .search-input {
            flex: 1; background: transparent; border: none; outline: none;
            color: white; padding: 5px 10px; font-family: inherit; font-size: 0.9rem;
        }

        .mic-btn {
            background: transparent; border: none; cursor: pointer; color: white;
            display: flex; align-items: center; opacity: 0.5; transition: 0.3s;
        }
        .mic-btn:hover { opacity: 1; color: var(--accent); }
        .mic-btn.active { opacity: 1; color: #ff4b4b; transform: scale(1.1); animation: pulseMic 1s infinite alternate;}
        @keyframes pulseMic { from { transform: scale(1); } to { transform: scale(1.2); } }

        /* Main Dashboard Area */
        .app-container {
            position: relative; z-index: 10; padding: 100px 40px 150px;
            max-width: 1400px; margin: 0 auto;
        }

        .section-title {
            font-size: 2rem; font-weight: 800; margin-bottom: 20px;
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Playlist Grid */
        .grid-container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px; margin-bottom: 50px;
        }

        .card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border);
            border-radius: 15px; padding: 15px; cursor: pointer; transition: 0.3s;
            backdrop-filter: blur(10px);
        }
        .card:hover { transform: translateY(-10px); background: rgba(255, 255, 255, 0.08); border-color: var(--accent); }
        
        .card img {
            width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 10px;
            margin-bottom: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        
        .card-title { font-weight: 800; font-size: 1rem; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .card-subtitle { font-size: 0.75rem; color: #888; }

        /* List View (Hidden by default) */
        #list-view { display: none; }
        .back-btn { background: transparent; border: none; color: white; cursor: pointer; font-size: 1rem; margin-bottom: 20px; opacity: 0.7; }
        .back-btn:hover { color: var(--accent); opacity: 1; }
        
        .playlist-header { display: flex; align-items: flex-end; gap: 30px; margin-bottom: 40px; }
        .playlist-header img { width: 200px; height: 200px; border-radius: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .playlist-header h1 { font-size: 4rem; line-height: 1; margin-bottom: 10px; }

        .song-row {
            display: flex; align-items: center; padding: 15px 20px; border-radius: 10px;
            cursor: pointer; transition: 0.2s; border: 1px solid transparent; gap: 20px;
        }
        .song-row:hover { background: rgba(255,255,255,0.05); }
        .song-row.active { background: rgba(0,255,163,0.1); border-color: var(--accent); }
        .song-row img { width: 40px; height: 40px; border-radius: 5px; }
        .song-info { flex: 1; }
        .song-info h4 { font-size: 1rem; margin-bottom: 3px; }
        .song-info p { font-size: 0.75rem; color: #888; }

        /* AI Camera Dock */
        #ai-dock { position: fixed; top: 100px; right: 30px; width: 220px; z-index: 10000; }
        #video-wrap { width: 100%; height: 124px; border-radius: 15px; overflow: hidden; border: 1px solid var(--border); background: #000; position: relative; display: none; }
        video, #hand-canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #ai-status { margin-top: 10px; background: rgba(0,255,163,0.1); color: var(--accent); padding: 8px; border-radius: 8px; text-align: center; font-weight: 800; font-size: 0.7rem; border: 1px solid var(--accent); display: none; }
        .control-btn { background: #fff; color: #000; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-weight: 800; width: 100%; margin-top: 10px; font-size: 0.8rem; transition: 0.3s; }
        .control-btn.active { background: #ff4b4b; color: #fff; }

        /* Bottom Player Bar */
        .player-bar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 95%; max-width: 1000px; height: 90px;
            background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(30px);
            border-radius: 20px; padding: 0 30px; display: flex; align-items: center; justify-content: space-between;
            border: 1px solid var(--border); z-index: 9999; box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
        }

        .player-left { display: flex; align-items: center; gap: 15px; width: 30%; }
        #np-cover { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; background: #222; }
        .np-info h4 { font-size: 0.9rem; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px;}
        .np-info p { font-size: 0.7rem; color: #888; }

        .player-center { flex: 1; display: flex; flex-direction: column; align-items: center; max-width: 40%; }
        .controls { display: flex; align-items: center; gap: 20px; margin-bottom: 10px; }
        .pro-icon { width: 20px; height: 20px; fill: currentColor; cursor: pointer; opacity: 0.6; transition: 0.3s; }
        .pro-icon:hover { opacity: 1; color: var(--accent); }
        .play-btn { background: white; color: black; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .play-btn:hover { transform: scale(1.1); }
        .play-btn svg { width: 18px; height: 18px; fill: currentColor; }

        .progress-wrapper { display: flex; align-items: center; gap: 10px; width: 100%; font-size: 0.7rem; color: #888; }
        .progress-bg { flex: 1; height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; cursor: pointer; position: relative;}
        #pFill { height: 100%; background: var(--accent); width: 0%; border-radius: 10px; box-shadow: 0 0 10px var(--accent); pointer-events: none;}

        .player-right { width: 30%; display: flex; justify-content: flex-end; }
        
        /* Loader */
        #loader { display: none; text-align: center; padding: 50px; font-weight: 800; color: var(--accent); }
    </style>
</head>
<body>

    <!-- 3D Background -->
    <div id="canvas-container"></div>

    <!-- Hidden YouTube Player -->
    <div id="yt-player" style="position: absolute; top: -9999px; left: -9999px;"></div>

    <!-- Top Navigation -->
    <div class="top-nav">
        <div class="search-container">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="opacity: 0.5; margin-right: 10px;"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" class="search-input" id="searchInput" placeholder="Search any song or artist on YouTube..." onkeypress="handleSearch(event)">
            <button class="mic-btn" id="micBtn" onclick="startSpeech()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
            </button>
        </div>
    </div>

    <!-- AI Camera Dock -->
    <div id="ai-dock">
        <div id="video-wrap">
            <video id="input_video" playsinline></video>
            <canvas id="hand-canvas"></canvas>
        </div>
        <div id="ai-status">SYSTEM ACTIVE</div>
        <button id="aiToggle" class="control-btn" onclick="toggleAI()">START GESTURE AI</button>
    </div>

    <!-- Main Content -->
    <div class="app-container">
        
        <div id="loader">Fetching from YouTube Servers...</div>

        <!-- Dashboard View -->
        <div id="dashboard-view">
            <h2 class="section-title">Popular Playlists</h2>
            <div class="grid-container" id="playlist-grid">
                <!-- Playlists injected here -->
            </div>
            
            <h2 class="section-title">Trending Hits</h2>
            <div class="grid-container" id="trending-grid">
                <!-- Trending injected here -->
            </div>
        </div>

        <!-- List/Track View -->
        <div id="list-view">
            <button class="back-btn" onclick="showDashboard()">← Back to Home</button>
            <div class="playlist-header">
                <img id="pl-cover" src="" alt="Cover">
                <div>
                    <p style="font-size: 0.8rem; font-weight: 800; letter-spacing: 2px; color: var(--accent);">PLAYLIST</p>
                    <h1 id="pl-title">Playlist Title</h1>
                    <p id="pl-desc" style="color: #888;">YouTube Generated Data</p>
                </div>
            </div>
            <div id="track-list">
                <!-- Songs injected here -->
            </div>
        </div>

    </div>

    <!-- Bottom Player -->
    <div class="player-bar">
        <div class="player-left">
            <img id="np-cover" src="https://via.placeholder.com/50" alt="Cover">
            <div class="np-info">
                <h4 id="np-title">Ready to Play</h4>
                <p id="np-artist">Aura AI Setup</p>
            </div>
        </div>
        
        <div class="player-center">
            <div class="controls">
                <svg class="pro-icon" onclick="prevSong()" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                <div class="play-btn" id="masterPlay" onclick="togglePlay()">
                    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                </div>
                <svg class="pro-icon" onclick="nextSong()" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </div>
            <div class="progress-wrapper">
                <span id="ui-time-current">0:00</span>
                <div class="progress-bg" onclick="seek(event)">
                    <div id="pFill"></div>
                </div>
                <span id="ui-time-total">0:00</span>
            </div>
        </div>

        <div class="player-right">
            <div style="font-size: 0.7rem; color: var(--accent); font-weight: 800;">AURA CLOUD ENGINE</div>
        </div>
    </div>

    <script>
        // --- API CONFIGURATION ---
        const YT_API_KEY = "AIzaSyDmUIQrBG1L767suqkhRcvmJiAXS6qqDtI"; // Your API Key
        
        // Good predefined YouTube Playlists IDs for Dashboard
        const featuredPlaylists = [
            { id: "PL4fGSI1pDJn6puJdseH2Rt9sMvt9E2M4i", title: "Global Top 100" },
            { id: "PLMC9KNkIncKvYin_USF1qoJQnIyMAfRxl", title: "Pop Hits 2024" },
            { id: "PLOzDu-MXXLliO9fBNZOQTBDddoA3FzZUo", title: "Lo-Fi Chill Beats" },
            { id: "RDCLAK5uy_mFWgXyE2y9JUSf2w7a4dM23wA9-k2O_1M", title: "Hip Hop Central" }
        ];

        // --- GLOBAL STATE ---
        let ytPlayer;
        let isYtReady = false;
        let isPlaying = false;
        let currentTrackList = [];
        let currentIndex = 0;

        // Icons
        const iconPlay = `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;
        const iconPause = `<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;

        // --- YOUTUBE IFRAME API ---
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('yt-player', {
                height: '10', width: '10', videoId: '',
                playerVars: { 'autoplay': 1, 'controls': 0, 'showinfo': 0 },
                events: {
                    'onReady': () => { isYtReady = true; initDashboard(); },
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                isPlaying = true;
                document.getElementById('masterPlay').innerHTML = iconPause;
                requestAnimationFrame(updateYouTubeProgress);
            } else {
                isPlaying = false;
                document.getElementById('masterPlay').innerHTML = iconPlay;
                if(event.data == YT.PlayerState.ENDED) nextSong();
            }
        }

        function updateYouTubeProgress() {
            if (isPlaying && ytPlayer && ytPlayer.getCurrentTime) {
                const cur = ytPlayer.getCurrentTime();
                const dur = ytPlayer.getDuration();
                if(dur > 0) {
                    document.getElementById('pFill').style.width = (cur / dur) * 100 + "%";
                    document.getElementById('ui-time-current').innerText = formatTime(cur);
                    document.getElementById('ui-time-total').innerText = formatTime(dur);
                }
                requestAnimationFrame(updateYouTubeProgress);
            }
        }

        function formatTime(sec) {
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function seek(e) {
            if (!ytPlayer || !ytPlayer.getDuration) return;
            const dur = ytPlayer.getDuration();
            const newTime = (e.offsetX / e.currentTarget.clientWidth) * dur;
            ytPlayer.seekTo(newTime, true);
        }

        // --- YOUTUBE DATA API (FETCHING) ---
        async function fetchAPI(url) {
            const res = await fetch(url);
            return await res.json();
        }

        async function initDashboard() {
            const grid = document.getElementById('playlist-grid');
            grid.innerHTML = '';
            
            // Load featured playlists cards
            for (let pl of featuredPlaylists) {
                const url = `https://www.googleapis.com/youtube/v3/playlists?part=snippet&id=${pl.id}&key=${YT_API_KEY}`;
                const data = await fetchAPI(url);
                if (data.items && data.items.length > 0) {
                    const snippet = data.items[0].snippet;
                    const imgUrl = snippet.thumbnails.high ? snippet.thumbnails.high.url : snippet.thumbnails.default.url;
                    
                    grid.innerHTML += `
                        <div class="card" onclick="loadPlaylist('${pl.id}', '${snippet.title.replace(/'/g, "\\'")}', '${imgUrl}')">
                            <img src="${imgUrl}" alt="Cover">
                            <div class="card-title">${snippet.title}</div>
                            <div class="card-subtitle">${snippet.channelTitle}</div>
                        </div>
                    `;
                }
            }

            // Load trending pseudo-playlist (Search for trending music)
            const trendGrid = document.getElementById('trending-grid');
            const trendUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=popular+music+video&type=video&videoCategoryId=10&maxResults=6&key=${YT_API_KEY}`;
            const trendData = await fetchAPI(trendUrl);
            
            if(trendData.items) {
                trendData.items.forEach(item => {
                    const snippet = item.snippet;
                    const imgUrl = snippet.thumbnails.medium.url;
                    trendGrid.innerHTML += `
                        <div class="card" onclick="quickPlaySingle('${item.id.videoId}', '${snippet.title.replace(/'/g, "\\'")}', '${snippet.channelTitle.replace(/'/g, "\\'")}', '${imgUrl}')">
                            <img src="${imgUrl}" alt="Cover">
                            <div class="card-title">${snippet.title}</div>
                            <div class="card-subtitle">${snippet.channelTitle}</div>
                        </div>
                    `;
                });
            }
        }

        async function loadPlaylist(playlistId, title, imgUrl) {
            document.getElementById('dashboard-view').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${playlistId}&key=${YT_API_KEY}`;
            const data = await fetchAPI(url);

            document.getElementById('pl-cover').src = imgUrl;
            document.getElementById('pl-title').innerText = title;
            
            currentTrackList = [];
            const trackListEl = document.getElementById('track-list');
            trackListEl.innerHTML = '';

            if (data.items) {
                data.items.forEach((item, index) => {
                    // Filter out private/deleted videos
                    if (item.snippet.title === "Private video" || item.snippet.title === "Deleted video") return;
                    
                    const videoId = item.snippet.resourceId.videoId;
                    const vTitle = item.snippet.title;
                    const channel = item.snippet.videoOwnerChannelTitle || "Unknown Artist";
                    const thumb = item.snippet.thumbnails?.default?.url || "https://via.placeholder.com/40";

                    currentTrackList.push({ id: videoId, title: vTitle, artist: channel, cover: thumb });

                    trackListEl.innerHTML += `
                        <div class="song-row" id="row-${index}" onclick="playFromList(${currentTrackList.length - 1})">
                            <div style="width: 20px; color: #888; text-align:right;">${currentTrackList.length}</div>
                            <img src="${thumb}" alt="thumb">
                            <div class="song-info">
                                <h4>${vTitle}</h4>
                                <p>${channel}</p>
                            </div>
                        </div>
                    `;
                });
            }

            document.getElementById('loader').style.display = 'none';
            document.getElementById('list-view').style.display = 'block';
        }

        // --- PLAYBACK LOGIC ---
        function playFromList(index) {
            if(!isYtReady) return alert("Player loading, please wait.");
            currentIndex = index;
            const song = currentTrackList[index];
            
            // Update UI
            document.querySelectorAll('.song-row').forEach(r => r.classList.remove('active'));
            document.getElementById(`row-${index}`).classList.add('active');
            
            updatePlayerBar(song.title, song.artist, song.cover);
            
            // Play via YT
            ytPlayer.loadVideoById(song.id);
        }

        function quickPlaySingle(videoId, title, artist, cover) {
            currentTrackList = [{ id: videoId, title: title, artist: artist, cover: cover }];
            currentIndex = 0;
            updatePlayerBar(title, artist, cover);
            ytPlayer.loadVideoById(videoId);
        }

        function updatePlayerBar(title, artist, cover) {
            document.getElementById('np-title').innerText = title;
            document.getElementById('np-artist').innerText = artist;
            document.getElementById('np-cover').src = cover;
        }

        function togglePlay() { 
            if(!ytPlayer || !ytPlayer.getPlayerState) return;
            isPlaying ? ytPlayer.pauseVideo() : ytPlayer.playVideo(); 
        }
        function nextSong() { 
            if(currentTrackList.length === 0) return;
            let nextIdx = (currentIndex + 1) % currentTrackList.length;
            playFromList(nextIdx);
        }
        function prevSong() { 
            if(currentTrackList.length === 0) return;
            let prevIdx = (currentIndex - 1 + currentTrackList.length) % currentTrackList.length;
            playFromList(prevIdx);
        }

        function showDashboard() {
            document.getElementById('list-view').style.display = 'none';
            document.getElementById('dashboard-view').style.display = 'block';
        }

        // --- SEARCH & VOICE LOGIC ---
        async function handleSearch(e) {
            if(e.key === 'Enter') {
                performSearch(e.target.value);
            }
        }

        async function performSearch(query) {
            if(!query) return;
            document.getElementById('dashboard-view').style.display = 'none';
            document.getElementById('list-view').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=15&q=${encodeURIComponent(query + ' song audio')}&type=video&key=${YT_API_KEY}`;
            const data = await fetchAPI(url);

            document.getElementById('pl-cover').src = "https://images.unsplash.com/photo-1614680376593-902f74cf0d41?q=80&w=400&auto=format&fit=crop";
            document.getElementById('pl-title').innerText = `Search: "${query}"`;
            
            currentTrackList = [];
            const trackListEl = document.getElementById('track-list');
            trackListEl.innerHTML = '';

            if (data.items) {
                data.items.forEach((item, index) => {
                    const videoId = item.id.videoId;
                    const vTitle = item.snippet.title;
                    const channel = item.snippet.channelTitle;
                    const thumb = item.snippet.thumbnails.default.url;

                    currentTrackList.push({ id: videoId, title: vTitle, artist: channel, cover: thumb });

                    trackListEl.innerHTML += `
                        <div class="song-row" id="row-${index}" onclick="playFromList(${index})">
                            <div style="width: 20px; color: #888; text-align:right;">${index + 1}</div>
                            <img src="${thumb}" alt="thumb">
                            <div class="song-info">
                                <h4>${vTitle}</h4>
                                <p>${channel}</p>
                            </div>
                        </div>
                    `;
                });
            }

            document.getElementById('loader').style.display = 'none';
            document.getElementById('list-view').style.display = 'block';
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        function startSpeech() {
            if (!SpeechRecognition) return alert("Speech recognition not supported in this browser.");
            const mic = document.getElementById('micBtn');
            mic.classList.add('active');
            
            const recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.lang = 'en-US';
            
            recognition.start();
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                document.getElementById('searchInput').value = transcript;
                performSearch(transcript);
            };
            recognition.onend = () => mic.classList.remove('active');
        }

        // --- 3D VISUALIZER (Math Based for YT CORS Bypass) ---
        let scene, camera, renderer, mesh;
        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const geo = new THREE.IcosahedronGeometry(4, 15);
            const mat = new THREE.MeshPhongMaterial({
                color: 0x00ffa3, wireframe: true, transparent: true, opacity: 0.15
            });
            mesh = new THREE.Mesh(geo, mat);
            scene.add(mesh);
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const light = new THREE.PointLight(0x00ffa3, 2);
            light.position.set(10, 10, 10);
            scene.add(light);
            camera.position.z = 8;

            function animate3D() {
                requestAnimationFrame(animate3D);
                mesh.rotation.y += 0.003;
                
                // Reactive Heartbeat Pulse when playing
                if(isPlaying) {
                    let beat = 1 + Math.sin(Date.now() * 0.008) * 0.15;
                    mesh.scale.set(beat, beat, beat);
                } else {
                    mesh.scale.set(1, 1, 1);
                }
                
                renderer.render(scene, camera);
            }
            animate3D();
        }

        // --- MEDIAPIPE GESTURE AI ---
        let aiActive = false, cameraInstance = null;
        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });
        
        hands.onResults((res) => {
            const canvas = document.getElementById('hand-canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (res.multiHandLandmarks?.[0]) {
                const marks = res.multiHandLandmarks[0];
                drawConnectors(ctx, marks, HAND_CONNECTIONS, {color: '#00ffa3', lineWidth: 4});
                drawLandmarks(ctx, marks, {color: '#ffffff', lineWidth: 1, radius: 2});
                handleGestures(marks);
            }
        });

        function handleGestures(marks) {
            const now = Date.now();
            if (now - (window.lastT || 0) < 1800) return; // Cooldown
            
            let upFingers = 0;
            const fingerTips = [8, 12, 16, 20];
            fingerTips.forEach(id => { if (marks[id].y < marks[id-2].y - 0.05) upFingers++; });
            
            const status = document.getElementById('ai-status');
            status.style.display = "block";

            if (upFingers === 0) { status.innerText = "PLAY"; if(!isPlaying) togglePlay(); window.lastT = now; }
            else if (upFingers >= 4) { status.innerText = "PAUSE"; if(isPlaying) togglePlay(); window.lastT = now; }
            else if (upFingers === 1) { status.innerText = "NEXT"; nextSong(); window.lastT = now; }
            else if (upFingers === 2) { status.innerText = "PREV"; prevSong(); window.lastT = now; }
        }

        async function toggleAI() {
            const btn = document.getElementById('aiToggle');
            const wrap = document.getElementById('video-wrap');
            if (!aiActive) {
                aiActive = true;
                btn.innerText = "STOP AI";
                btn.classList.add('active');
                wrap.style.display = "block";
                const video = document.getElementById('input_video');
                cameraInstance = new Camera(video, {
                    onFrame: async () => { if(aiActive) await hands.send({image: video}); },
                    width: 640, height: 480
                });
                cameraInstance.start();
            } else {
                aiActive = false;
                btn.innerText = "START GESTURE AI";
                btn.classList.remove('active');
                wrap.style.display = "none";
                document.getElementById('ai-status').style.display = "none";
                if(cameraInstance) await cameraInstance.stop();
            }
        }

        // Initialize 3D on load
        window.onload = init3D;

    </script>
</body>
</html>
