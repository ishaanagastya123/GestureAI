<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> | Infinity 3D Glass</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #00ffa3;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #000; color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden; min-height: 100vh;
        }

        /* 3D CORE - Bottom Layer */
        #canvas-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }

        /* SCROLLABLE UI - Middle Layer */
        .ui-wrapper {
            position: relative; width: 100%; max-width: 850px;
            margin: 0 auto; padding: 120px 20px 250px;
            z-index: 10;
        }

        .main-glass {
            background: rgba(10, 10, 10, 0.4);
            backdrop-filter: blur(60px) saturate(180%);
            -webkit-backdrop-filter: blur(60px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 50px; padding: 50px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
        }

        h1 { font-size: 3.5rem; font-weight: 800; letter-spacing: -3px; margin-bottom: 30px; 
             background: linear-gradient(to bottom, #fff, #555); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .song-row {
            padding: 20px 30px; border-radius: 25px; cursor: pointer;
            margin-bottom: 10px; display: flex; justify-content: space-between;
            background: rgba(255,255,255,0.02); transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .song-row:hover { background: rgba(255,255,255,0.07); transform: scale(1.02); }
        .song-row.active { background: rgba(255,255,255,0.1); border: 1px solid var(--accent); }

        /* FIXED INTERFACE ELEMENTS - Top Layer */
        #ai-dock {
            position: fixed; top: 30px; right: 30px; width: 260px;
            z-index: 10000; /* Ensure it is on the very top */
        }

        #video-wrap {
            width: 100%; height: 146px; border-radius: 24px;
            overflow: hidden; border: 2px solid var(--border);
            background: #000; position: relative; display: none;
        }
        video, #hand-canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        #ai-status {
            margin-top: 10px; background: rgba(0,255,163,0.1); color: var(--accent);
            padding: 10px; border-radius: 12px; text-align: center;
            font-weight: 800; font-size: 0.7rem; letter-spacing: 1px;
            border: 1px solid var(--accent); display: none;
        }

        .control-btn {
            background: #fff; color: #000; border: none; padding: 12px 25px;
            border-radius: 50px; cursor: pointer; font-weight: 800;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); transition: 0.3s;
        }
        .control-btn.active { background: #ff4b4b; color: #fff; }

        /* FIXED PLAYER BAR - Top Layer */
        .player-bar {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 800px; height: 100px;
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(40px) brightness(1.2);
            border-radius: 100px; padding: 0 40px;
            display: flex; align-items: center; justify-content: space-between;
            border: 1px solid var(--border);
            z-index: 9999;
        }

        .play-btn { background: white; color: black; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; }
        .progress-container { flex-grow: 1; margin: 0 30px; }
        .progress-bg { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; cursor: pointer; }
        #pFill { height: 100%; background: var(--accent); width: 0%; box-shadow: 0 0 15px var(--accent); }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ai-dock">
        <div id="video-wrap">
            <video id="input_video" playsinline></video>
            <canvas id="hand-canvas"></canvas>
        </div>
        <div id="ai-status">SYSTEM ACTIVE</div>
        <div style="text-align: right; margin-top: 10px;">
            <button id="aiToggle" class="control-btn" onclick="toggleAI()">START AI</button>
        </div>
    </div>

    <div class="ui-wrapper">
        <div class="main-glass">
            <h1>GestureAI</h1>
            <div id="track-list"></div>
        </div>
    </div>

    <div class="player-bar">
        <div style="width: 25%">
            <div id="ui-title" style="font-weight:800; font-size:0.85rem">Ready</div>
            <div id="ui-artist" style="font-size:0.65rem; opacity:0.5">Aura Infinity</div>
        </div>
        <div class="progress-container">
            <div style="display:flex; justify-content:center; gap:25px; margin-bottom:8px">
                <span onclick="prevSong()" style="cursor:pointer; font-size:1.2rem">⏮</span>
                <div class="play-btn" id="masterPlay" onclick="togglePlay()">▶</div>
                <span onclick="nextSong()" style="cursor:pointer; font-size:1.2rem">⏭</span>
            </div>
            <div class="progress-bg" onclick="seek(event)">
                <div id="pFill"></div>
            </div>
        </div>
        <div id="ui-time" style="font-size:0.75rem; opacity:0.5; width: 50px; text-align: right;">0:00</div>
    </div>

    <audio id="mainAudio" crossorigin="anonymous"></audio>

    <script>
        const songs = [
            { name: "Title song", artist: "Shashwat sachdev", file: "song1.mp3" },
            { name: "Aari Aari", artist: "Shashwat sachdev", file: "song2.mp3" },
            { name: "Fasla", artist: "Fipperachi", file: "song3.mp3" },
            { name: "Nall nachna", artist: "Dhurandar", file: "song4.mp3" },
            { name: "Rambha ho", artist: "Dhurandar", file: "song5.mp3" },
            { name: "Run down city", artist: "Dhurandar", file: "song6.mp3" },
            { name: "Move yeh isq", artist: "Dhurandar", file: "song7.mp3" }
        ];

        let currentIndex = 0, isPlaying = false, audioCtx, analyser, dataArray;
        let aiActive = false, cameraInstance = null;
        const audio = document.getElementById('mainAudio');

        // --- THREE.JS ENGINE ---
        let scene, camera, renderer, material;
        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const geo = new THREE.IcosahedronGeometry(4, 15);
            material = new THREE.MeshPhongMaterial({
                color: 0x00ffa3,
                wireframe: true,
                transparent: true,
                opacity: 0.2
            });
            const mesh = new THREE.Mesh(geo, material);
            scene.add(mesh);
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const light = new THREE.PointLight(0x00ffa3, 1);
            light.position.set(10, 10, 10);
            scene.add(light);
            camera.position.z = 8;

            function render() {
                requestAnimationFrame(render);
                mesh.rotation.y += 0.005;
                if(isPlaying && dataArray) {
                    analyser.getByteFrequencyData(dataArray);
                    let scale = 1 + (dataArray[10] / 255) * 0.5;
                    mesh.scale.set(scale, scale, scale);
                }
                renderer.render(scene, camera);
            }
            render();
        }

        // --- AI ENGINE (CLEAN START/STOP) ---
        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8 });

        hands.onResults((res) => {
            const canvas = document.getElementById('hand-canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (res.multiHandLandmarks?.[0]) {
                const marks = res.multiHandLandmarks[0];
                drawConnectors(ctx, marks, HAND_CONNECTIONS, {color: '#00ffa3', lineWidth: 3});
                handleGestures(marks);
            }
        });

        function handleGestures(marks) {
            const now = Date.now();
            if (now - (window.lastT || 0) < 1500) return;

            let up = 0;
            [8, 12, 16, 20].forEach(id => { if (marks[id].y < marks[id-2].y - 0.04) up++; });

            const status = document.getElementById('ai-status');
            status.style.display = "block";

            if (up === 0) { status.innerText = "COMMAND: PLAY"; playSong(); window.lastT = now; }
            else if (up >= 4) { status.innerText = "COMMAND: PAUSE"; pauseSong(); window.lastT = now; }
            else if (up === 1) { status.innerText = "COMMAND: NEXT"; nextSong(); window.lastT = now; }
            else if (up === 2) { status.innerText = "COMMAND: PREVIOUS"; prevSong(); window.lastT = now; }
        }

        async function toggleAI() {
            const btn = document.getElementById('aiToggle');
            const wrap = document.getElementById('video-wrap');
            const status = document.getElementById('ai-status');

            if (!aiActive) {
                aiActive = true;
                btn.innerText = "STOP AI";
                btn.classList.add('active');
                wrap.style.display = "block";
                status.style.display = "block";
                
                const video = document.getElementById('input_video');
                cameraInstance = new Camera(video, {
                    onFrame: async () => { if(aiActive) await hands.send({image: video}); },
                    width: 640, height: 480
                });
                cameraInstance.start();
            } else {
                aiActive = false;
                btn.innerText = "START AI";
                btn.classList.remove('active');
                wrap.style.display = "none";
                status.style.display = "none";
                if(cameraInstance) await cameraInstance.stop();
            }
        }

        // --- CORE PLAYER ---
        function loadSong(i, auto = true) {
            currentIndex = i;
            audio.src = songs[i].file;
            document.getElementById('ui-title').innerText = songs[i].name;
            document.getElementById('ui-artist').innerText = songs[i].artist;
            document.querySelectorAll('.song-row').forEach((r, idx) => r.classList.toggle('active', idx === i));
            if(auto) playSong();
        }

        function togglePlay() {
            if(!audioCtx) {
                audioCtx = new AudioContext();
                analyser = audioCtx.createAnalyser();
                const src = audioCtx.createMediaElementSource(audio);
                src.connect(analyser); analyser.connect(audioCtx.destination);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            }
            isPlaying ? pauseSong() : playSong();
        }

        function playSong() { audio.play(); isPlaying = true; document.getElementById('masterPlay').innerText = '⏸'; }
        function pauseSong() { audio.pause(); isPlaying = false; document.getElementById('masterPlay').innerText = '▶'; }
        function nextSong() { loadSong((currentIndex + 1) % songs.length); }
        function prevSong() { loadSong((currentIndex - 1 + songs.length) % songs.length); }

        audio.ontimeupdate = () => {
            document.getElementById('pFill').style.width = (audio.currentTime/audio.duration)*100 + "%";
            const m = Math.floor(audio.currentTime/60), s = Math.floor(audio.currentTime%60).toString().padStart(2,'0');
            document.getElementById('ui-time').innerText = `${m}:${s}`;
        };

        function seek(e) { audio.currentTime = (e.offsetX / e.currentTarget.clientWidth) * audio.duration; }

        window.onload = () => {
            const list = document.getElementById('track-list');
            songs.forEach((s, i) => {
                const r = document.createElement('div');
                r.className = 'song-row';
                r.innerHTML = `<div><b>${s.name}</b><br><small style="opacity:0.5">${s.artist}</small></div><div>0${i+1}</div>`;
                r.onclick = () => loadSong(i);
                list.appendChild(r);
            });
            loadSong(0, false);
            init3D();
        };
    </script>
</body>
</html>
